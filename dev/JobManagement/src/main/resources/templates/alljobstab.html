<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head('Job Offers')"></head>
<body>

<nav th:replace="fragments :: navbar"></nav>

<div class="container">
    <header th:replace="fragments :: pageHeader('Job Offers', 'Public list and search of job offers')"></header>

    <ul th:replace="fragments :: mainNavigation(null, null, null, 'active', null, null, null)"></ul>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">Search filters</h5>
            <form action="/alljobs" method="GET" class="row g-3">
                <div class="col-12">
                    <label class="form-label">Sectors</label>
                    <div class="d-flex flex-wrap gap-3">
                        <div class="form-check" th:each="sector : ${sectors}">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="sectorIds"
                                   th:id="${'job-sector-' + sector.id}"
                                   th:value="${sector.id}"
                                   th:checked="${selectedSectorIds != null and selectedSectorIds.contains(sector.id)}">
                            <label class="form-check-label" th:for="${'job-sector-' + sector.id}" th:text="${sector.label}"></label>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="minimumRank" class="form-label">Minimum qualification rank</label>
                    <select id="minimumRank" name="minimumRank" class="form-select">
                        <option value="">No minimum rank</option>
                        <option th:each="level : ${qualificationLevels}"
                                th:value="${level.rank}"
                                th:text="${level.label + ' (rank ' + level.rank + ')'}"
                                th:selected="${minimumRank != null and minimumRank == level.rank}">
                        </option>
                    </select>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Apply filters</button>
                    <a href="/alljobs" class="btn btn-outline-secondary">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${hasFilter}" class="alert alert-info">
        Active filters applied. <strong th:text="${jobs.size()}"></strong> offer(s) found.
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">All job offers</h5>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Company</th>
                            <th>Sectors</th>
                            <th>Qualification</th>
                            <th>Date</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(jobs)}">
                            <td colspan="7" class="text-center text-muted">No job offer found.</td>
                        </tr>
                        <tr th:each="job : ${jobs}">
                            <td th:text="${job.id}"></td>
                            <td th:text="${job.title}"></td>
                            <td th:text="${job.company.denomination}"></td>
                            <td>
                                <span th:if="${job.sectors == null or job.sectors.isEmpty()}" class="text-muted">-</span>
                                <th:block th:each="sector,iter : ${job.sectors}">
                                    <span th:text="${sector.label}"></span><span th:if="${!iter.last}">, </span>
                                </th:block>
                            </td>
                            <td th:text="${job.qualificationLevel.label + ' (rank ' + job.qualificationLevel.rank + ')'}"></td>
                            <td th:text="${job.publicationdate}"></td>
                            <td>
                                <a class="btn btn-sm btn-outline-primary"
                                   th:href="@{/job/{id}(id=${job.id})}">View</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments :: loginModal"></div>
<th:block th:replace="fragments :: scripts"></th:block>
</body>
</html>
