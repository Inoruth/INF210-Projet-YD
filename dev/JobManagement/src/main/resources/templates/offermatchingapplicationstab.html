<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head('Matching Applications')"></head>
<body>

<nav th:replace="fragments :: navbar"></nav>

<div class="container">
    <header th:replace="fragments :: pageHeader('Matching Applications', 'Applications compatible with your selected offer')"></header>

    <ul th:replace="fragments :: mainNavigation(null, null, null, 'active', null, null, null)"></ul>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">Offer summary</h5>
            <div class="row g-3">
                <div class="col-md-6">
                    <strong>Offer ID:</strong>
                    <span th:text="${offer.id}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Title:</strong>
                    <span th:text="${offer.title}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Qualification:</strong>
                    <span th:text="${offer.qualificationLevel.label + ' (rank ' + offer.qualificationLevel.rank + ')'}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Publication date:</strong>
                    <span th:text="${offer.publicationdate}"></span>
                </div>
                <div class="col-12">
                    <strong>Sectors:</strong>
                    <span th:if="${offer.sectors == null or offer.sectors.isEmpty()}" class="text-muted">-</span>
                    <th:block th:each="sector,iter : ${offer.sectors}">
                        <span th:text="${sector.label}"></span><span th:if="${!iter.last}">, </span>
                    </th:block>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Matching applications</h5>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Candidate</th>
                        <th>Sectors</th>
                        <th>Qualification</th>
                        <th>Date</th>
                        <th>Details</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(applications)}">
                        <td colspan="6" class="text-center text-muted">No matching application found for this offer.</td>
                    </tr>
                    <tr th:each="jobApplication : ${applications}">
                        <td th:text="${jobApplication.id}"></td>
                        <td>
                            <a th:href="@{/candidate/{mail}(mail=${jobApplication.candidate.appUser.mail})}"
                               th:text="${jobApplication.candidate.firstname + ' ' + jobApplication.candidate.lastname}"></a>
                        </td>
                        <td>
                            <span th:if="${jobApplication.sectors == null or jobApplication.sectors.isEmpty()}" class="text-muted">-</span>
                            <th:block th:each="sector,iter : ${jobApplication.sectors}">
                                <span th:text="${sector.label}"></span><span th:if="${!iter.last}">, </span>
                            </th:block>
                        </td>
                        <td th:text="${jobApplication.qualificationLevel.label + ' (rank ' + jobApplication.qualificationLevel.rank + ')'}"></td>
                        <td th:text="${jobApplication.appdate}"></td>
                        <td>
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/application/{id}(id=${jobApplication.id})}">View</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <a class="btn btn-secondary mt-3"
               th:href="@{/managemyoffers/{mail}(mail=${company.appUser.mail})}">Back to my offers</a>
        </div>
    </div>
</div>

<div th:replace="fragments :: loginModal"></div>
<th:block th:replace="fragments :: scripts"></th:block>
</body>
</html>
