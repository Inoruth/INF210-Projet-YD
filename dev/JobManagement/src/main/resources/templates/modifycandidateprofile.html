<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head('Modify Candidate Profile')"></head>
<body>

<nav th:replace="fragments :: navbar"></nav>

<div class="container">
    <header th:replace="fragments :: pageHeader('Modify Candidate Profile', 'Update your applicant identity details')"></header>

    <ul th:replace="fragments :: mainNavigation(null, null, null, null, 'active', null, null)"></ul>

    <div th:if="${param.error != null}" class="alert alert-danger">
        <span th:if="${param.error[0] == 'lastname-required'}">Lastname is required.</span>
        <span th:if="${param.error[0] == 'lastname-too-long'}">Lastname must not exceed 50 characters.</span>
        <span th:if="${param.error[0] == 'firstname-too-long'}">Firstname must not exceed 50 characters.</span>
        <span th:if="${param.error[0] == 'city-too-long'}">City must not exceed 100 characters.</span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Candidate information</h5>

            <form action="/modifycandidateprofile" method="POST" class="row g-3">
                <input type="hidden" name="mail" th:value="${candidate.appUser.mail}">

                <div class="col-12">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:value="${candidate.appUser.mail}" readonly>
                </div>

                <div class="col-md-6">
                    <label for="lastname" class="form-label">Lastname</label>
                    <input id="lastname" type="text" name="lastname" class="form-control"
                           maxlength="50" required th:value="${candidate.lastname}">
                </div>

                <div class="col-md-6">
                    <label for="firstname" class="form-label">Firstname</label>
                    <input id="firstname" type="text" name="firstname" class="form-control"
                           maxlength="50" th:value="${candidate.firstname}">
                </div>

                <div class="col-md-6">
                    <label for="city" class="form-label">City</label>
                    <input id="city" type="text" name="city" class="form-control" maxlength="100"
                           th:value="${candidate.city}">
                </div>

                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save changes</button>
                    <a class="btn btn-outline-secondary"
                       th:href="@{/managemyapplications/{mail}(mail=${candidate.appUser.mail})}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="fragments :: loginModal"></div>
<th:block th:replace="fragments :: scripts"></th:block>
</body>
</html>
