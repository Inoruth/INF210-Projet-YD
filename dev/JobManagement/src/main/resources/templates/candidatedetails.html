<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head('Applicant Details')"></head>
<body>

<nav th:replace="fragments :: navbar"></nav>

<div class="container">
    <header th:replace="fragments :: pageHeader('Applicant Details', 'Detailed information and published applications')"></header>

    <ul th:replace="fragments :: mainNavigation(null, null, 'active', null, null, null, null)"></ul>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">Applicant profile</h5>
            <div class="row g-3">
                <div class="col-md-6">
                    <strong>Email:</strong>
                    <span th:text="${candidate.appUser.mail}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Lastname:</strong>
                    <span th:text="${candidate.lastname}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Firstname:</strong>
                    <span th:text="${candidate.firstname != null and !#strings.isEmpty(candidate.firstname) ? candidate.firstname : '-'}"></span>
                </div>
                <div class="col-md-6">
                    <strong>City:</strong>
                    <span th:text="${candidate.city != null and !#strings.isEmpty(candidate.city) ? candidate.city : '-'}"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Published applications</h5>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>CV</th>
                            <th>Sectors</th>
                            <th>Qualification</th>
                            <th>Date</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(applications)}">
                            <td colspan="6" class="text-center text-muted">No application published by this candidate.</td>
                        </tr>
                        <tr th:each="jobApplication : ${applications}">
                            <td th:text="${jobApplication.id}"></td>
                            <td th:text="${jobApplication.cv}"></td>
                            <td>
                                <span th:if="${jobApplication.sectors == null or jobApplication.sectors.isEmpty()}" class="text-muted">-</span>
                                <th:block th:each="sector,iter : ${jobApplication.sectors}">
                                    <span th:text="${sector.label}"></span><span th:if="${!iter.last}">, </span>
                                </th:block>
                            </td>
                            <td th:text="${jobApplication.qualificationLevel.label}"></td>
                            <td th:text="${jobApplication.appdate}"></td>
                            <td>
                                <a class="btn btn-sm btn-outline-primary"
                                   th:href="@{/application/{id}(id=${jobApplication.id})}">View</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <a href="/allapplicants" class="btn btn-secondary mt-3">Back to applicants</a>
        </div>
    </div>
</div>

<div th:replace="fragments :: loginModal"></div>
<th:block th:replace="fragments :: scripts"></th:block>
</body>
</html>
